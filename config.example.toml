[scrape]
timeout_seconds = 5.0

[[hosts]]
name = "kontrol-lab"
host = "10.0.0.1"
port = 9100

[[hosts]]
name = "kontrol-cloud"
host = "lab.kontrol.com.br"
port = 9100

[display]
width = 20
height = 4
page_seconds = 4.0
refresh_seconds = 2.0

[interfaces]
# Se vazio, usa as interfaces anunciadas por node_pfsense_interface_info.
include = ["wan", "opt1", "lan"]

[oled]
enabled = true
model = "ssd1306" # ou "st7735" para display colorido SPI 80x160
i2c_port = 1
i2c_address = 60 # 0x3C
rotate = 0
spi_port = 0
spi_device = 0
spi_dc_pin = 24
spi_rst_pin = 25

[alert_thresholds]
# Percentuais
cpu_percent = 85
memory_percent = 90
storage_percent = 90
# Celsius
temperature_celsius = 75

[buzzer]
enabled = false
gpio_pin = 18
